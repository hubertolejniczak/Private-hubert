<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠️ Ważne — przeczytaj</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e13;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    /* ── FAKE LOADING OVERLAY ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: #0e0e13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 999;
    }

    .overlay-icon { font-size: 3.5rem; }

    .overlay-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e8e8f0;
      text-align: center;
    }

    .overlay-sub {
      font-size: 0.9rem;
      color: #6e6e8a;
    }

    .overlay-btn {
      margin-top: 0.5rem;
      background: #7c5cfc;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.9rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .overlay-btn:hover {
      background: #a688ff;
      transform: translateY(-1px);
    }

    /* ── MAIN CONTENT ── */
    .video-wrapper {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(124,92,252,0.25);
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .note {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e8e8f0;
      text-align: center;
      line-height: 1.5;
      max-width: 640px;
    }

    .note a {
      color: #a688ff;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .note a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- FAKE LOADING SCREEN -->
  <div id="overlay">
    <div class="overlay-icon">📄</div>
    <div class="overlay-title">Ważny dokument jest gotowy</div>
    <div class="overlay-sub">Kliknij aby otworzyć</div>
    <button class="overlay-btn" id="openBtn">Otwórz dokument</button>
  </div>

  <!-- ACTUAL CONTENT (iframe src ustawiane przez JS po kliknięciu) -->
  <div class="video-wrapper">
    <iframe id="yt" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <p class="note">heh, jak już tu jesteś to wypełnij ankietę odnośnie gildii:<br><a href="https://miro.com/app/board/uXjVGiSle4U=/" target="_blank" rel="noopener">link do Miro →</a></p>

  <script>
    document.getElementById('openBtn').addEventListener('click', function () {
      document.getElementById('yt').src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0';
      document.getElementById('overlay').style.display = 'none';
    });
  </script>

</body>
</html>
